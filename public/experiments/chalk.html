<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalk Caption Effect</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        canvas {
            box-shadow: 0 4px 40px rgba(0,0,0,0.8);
            border: 6px solid #2a3a2a;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .controls {
            background: #111; padding: 25px; border-radius: 12px;
            border: 1px solid #2a2a2a; display: flex; flex-wrap: wrap;
            gap: 30px; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); max-width: 900px;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; width: 160px; }
        .label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: #888;
        }
        .value-readout {
            font-family: monospace; color: #d4e8d4; font-size: 0.9rem;
            background: rgba(0,0,0,0.4); padding: 2px 6px;
            border-radius: 4px; border: 1px solid #2a2a2a;
        }
        button#playBtn {
            background: #d4e8d4; color: #1a2a1a; border: none;
            padding: 15px 30px; font-family: 'Caveat', cursive;
            font-size: 1.5rem; font-weight: 700; cursor: pointer; border-radius: 4px;
            transition: all 0.2s;
        }
        button#playBtn:hover { background: #fff; transform: scale(1.05); }
        button#playBtn:disabled { background: #333; color: #555; cursor: not-allowed; }
        .timer-display {
            font-family: monospace; font-size: 1.2rem; color: #d4e8d4;
            min-width: 80px; text-align: right;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #d4e8d4; margin-top: -6px; cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #333; border-radius: 2px;
        }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>
    <div class="controls">
        <button id="playBtn">Play</button>
        <div class="timer-display" id="timer">0.00s</div>

        <div style="border-left:1px solid #222; padding-left:30px; display:flex; flex-direction:column; gap:15px;">
            <div class="control-group">
                <div class="label"><span>Chalk Color</span></div>
                <input type="color" id="colorPicker" value="#e8f0e8"
                    style="-webkit-appearance:none;border:none;width:100%;height:30px;padding:0;background:none;cursor:pointer;border-radius:4px;overflow:hidden;">
            </div>
            <div class="control-group">
                <div class="label"><span>Texture</span><span id="texVal" class="value-readout">0.65</span></div>
                <input type="range" id="texSlider" min="0" max="1" step="0.05" value="0.65">
            </div>
        </div>

        <div style="border-left:1px solid #222; padding-left:30px; display:flex; flex-direction:column; gap:15px;">
            <div class="control-group">
                <div class="label"><span>Write Speed</span><span id="speedVal" class="value-readout">1.0</span></div>
                <input type="range" id="speedSlider" min="0.2" max="3" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <div class="label"><span>Dust</span><span id="dustVal" class="value-readout">0.5</span></div>
                <input type="range" id="dustSlider" min="0" max="1" step="0.05" value="0.5">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        const WIDTH = 1200, HEIGHT = 220;
        canvas.width = WIDTH; canvas.height = HEIGHT;

        const FONT_SIZE = 72;
        const FONT = `bold ${FONT_SIZE}px 'Caveat', cursive`;
        const SPACING = 24;

        // --- SRT DATA ---
        const srtRaw = `
1
00:00:00,200 --> 00:00:02,000
Hi. So

2
00:00:02,100 --> 00:00:04,900
I recently got back into playing Magic.

3
00:00:05,100 --> 00:00:07,500
It's surprisingly expensive!
`;

        const rawWords = [
            { punctuated_word: 'Hi.',           start: 0.24, end: 0.74 },
            { punctuated_word: 'So',            start: 1.44, end: 1.94 },
            { punctuated_word: 'I',             start: 2.16, end: 2.56 },
            { punctuated_word: 'recently',      start: 2.56, end: 3.04 },
            { punctuated_word: 'got',           start: 3.04, end: 3.28 },
            { punctuated_word: 'back',          start: 3.28, end: 3.44 },
            { punctuated_word: 'into',          start: 3.44, end: 3.92 },
            { punctuated_word: 'playing',       start: 3.92, end: 4.40 },
            { punctuated_word: 'Magic.',        start: 4.40, end: 4.72 },
            { punctuated_word: "It's",          start: 5.10, end: 5.40 },
            { punctuated_word: 'surprisingly',  start: 5.40, end: 6.20 },
            { punctuated_word: 'expensive!',    start: 6.20, end: 6.90 },
        ];

        function parseSRTTime(t) {
            const [hms, ms] = t.split(',');
            const [h, m, s] = hms.split(':').map(Number);
            return h * 3600 + m * 60 + s + Number(ms) / 1000;
        }
        function parseSRT(raw) {
            return raw.trim().split(/\n\s*\n/).map(block => {
                const lines = block.split('\n');
                if (lines.length < 3) return null;
                const [s, e] = lines[1].split(' --> ');
                return { start: parseSRTTime(s), end: parseSRTTime(e), text: lines.slice(2).join(' ') };
            }).filter(Boolean);
        }
        const srtBlocks = parseSRT(srtRaw);

        // --- SETTINGS ---
        let chalkColor = '#e8f0e8';
        let textureStrength = 0.65;
        let writeSpeed = 1.0;
        let dustAmount = 0.5;

        // --- STATE ---
        let isPlaying = false, startTs = 0, playbackTime = 0;

        // --- CHALK TEXTURE NOISE ---
        // Pre-generate noise texture
        const noiseCanvas = document.createElement('canvas');
        noiseCanvas.width = WIDTH; noiseCanvas.height = HEIGHT;
        const nCtx = noiseCanvas.getContext('2d');
        function buildNoise() {
            const imgData = nCtx.createImageData(WIDTH, HEIGHT);
            for (let i = 0; i < imgData.data.length; i += 4) {
                const v = Math.random() * 255;
                imgData.data[i] = v;
                imgData.data[i+1] = v;
                imgData.data[i+2] = v;
                imgData.data[i+3] = 255;
            }
            nCtx.putImageData(imgData, 0, 0);
        }
        buildNoise();

        // Offscreen canvas for chalk mask rendering
        const offCanvas = document.createElement('canvas');
        offCanvas.width = WIDTH; offCanvas.height = HEIGHT;
        const offCtx = offCanvas.getContext('2d');

        // Chalk dust particles
        let dustParticles = [];
        function spawnDust(x, y) {
            if (!dustAmount || Math.random() > dustAmount * 0.15) return;
            dustParticles.push({
                x, y,
                vx: (Math.random() - 0.5) * 1.5,
                vy: -(Math.random() * 1.5 + 0.5),
                life: 1,
                size: Math.random() * 3 + 1,
            });
        }
        function updateDust() {
            for (let i = dustParticles.length - 1; i >= 0; i--) {
                const d = dustParticles[i];
                d.x += d.vx;
                d.y += d.vy;
                d.vy += 0.04; // gravity
                d.life -= 0.03;
                if (d.life <= 0) dustParticles.splice(i, 1);
            }
        }
        function drawDust() {
            dustParticles.forEach(d => {
                ctx.save();
                ctx.globalAlpha = d.life * 0.6 * dustAmount;
                ctx.fillStyle = chalkColor;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function hexToRgb(h) {
            const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
            return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [232, 240, 232];
        }

        function drawChalkText(text, x, y, alpha) {
            if (alpha <= 0) return;

            // Render text to offscreen
            offCtx.clearRect(0, 0, WIDTH, HEIGHT);
            offCtx.font = FONT;
            offCtx.textBaseline = 'alphabetic';
            offCtx.textAlign = 'left';
            offCtx.fillStyle = '#fff';
            offCtx.fillText(text, x, y);

            // Get text mask pixels
            const textData = offCtx.getImageData(0, 0, WIDTH, HEIGHT);
            const noiseData = nCtx.getImageData(0, 0, WIDTH, HEIGHT);
            const rgb = hexToRgb(chalkColor);

            // Compose chalk effect: text mask × noise texture
            const result = ctx.getImageData(0, 0, WIDTH, HEIGHT);
            for (let i = 0; i < textData.data.length; i += 4) {
                const textAlpha = textData.data[i + 3] / 255;
                if (textAlpha < 0.01) continue;

                const noiseVal = noiseData.data[i] / 255;
                // Chalk dropout: noise below threshold becomes transparent
                const dropout = noiseVal < textureStrength * 0.6 ? 0 :
                    (noiseVal - textureStrength * 0.6) / (1 - textureStrength * 0.6 + 0.001);

                const finalAlpha = textAlpha * dropout * alpha;
                if (finalAlpha < 0.01) continue;

                // Blend onto existing pixel
                const idx = i;
                const existing = result.data[idx + 3] / 255;
                const blended = finalAlpha + existing * (1 - finalAlpha);
                if (blended < 0.001) continue;
                result.data[idx]   = (rgb[0] * finalAlpha + result.data[idx]   * existing * (1 - finalAlpha)) / blended;
                result.data[idx+1] = (rgb[1] * finalAlpha + result.data[idx+1] * existing * (1 - finalAlpha)) / blended;
                result.data[idx+2] = (rgb[2] * finalAlpha + result.data[idx+2] * existing * (1 - finalAlpha)) / blended;
                result.data[idx+3] = blended * 255;
            }
            ctx.putImageData(result, 0, 0);
        }

        function render(ts) {
            if (isPlaying) {
                playbackTime = (ts - startTs) / 1000;
                document.getElementById('timer').innerText = playbackTime.toFixed(2) + 's';
                const lastEnd = rawWords[rawWords.length - 1].end;
                if (playbackTime > lastEnd + 1.5) {
                    isPlaying = false;
                    playbackTime = 0;
                    dustParticles = [];
                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('playBtn').innerText = 'Replay';
                }
            }

            // Chalkboard background
            ctx.fillStyle = '#1c2b1c';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Subtle board texture overlay
            ctx.save();
            ctx.globalAlpha = 0.04;
            ctx.drawImage(noiseCanvas, 0, 0);
            ctx.restore();

            const activeBlock = srtBlocks.find(b => playbackTime >= b.start && playbackTime <= b.end + 0.3);

            if (activeBlock) {
                const blockWords = rawWords.filter(w => w.start >= activeBlock.start - 0.1 && w.start <= activeBlock.end + 0.1);

                ctx.font = FONT;
                ctx.textBaseline = 'alphabetic';
                ctx.textAlign = 'left';

                let totalWidth = 0;
                blockWords.forEach(w => { w._mw = ctx.measureText(w.punctuated_word).width; totalWidth += w._mw; });
                totalWidth += (blockWords.length - 1) * SPACING;
                let x = (WIDTH - totalWidth) / 2;
                const Y = HEIGHT * 0.72;

                // Rebuild noise occasionally for variation
                if (Math.random() < 0.015) buildNoise();

                blockWords.forEach(word => {
                    const rawProgress = Math.max(0, (playbackTime - word.start) / Math.max(0.01, word.end - word.start));
                    const progress = Math.min(1, rawProgress * writeSpeed);

                    if (progress <= 0) { x += word._mw + SPACING; return; }

                    // Calculate how many characters to show (partial last char supported via clip)
                    const charsExact = progress * word.punctuated_word.length;
                    const charsWhole = Math.floor(charsExact);
                    const partial = charsExact - charsWhole;

                    const visibleFull = word.punctuated_word.slice(0, charsWhole);
                    const nextChar = word.punctuated_word[charsWhole] || '';

                    // Draw fully completed characters
                    if (visibleFull) {
                        drawChalkText(visibleFull, x, Y, 1.0);
                    }

                    // Draw partial next character with clip
                    if (nextChar && partial > 0) {
                        const fullW = ctx.measureText(visibleFull).width;
                        const charW = ctx.measureText(nextChar).width;

                        ctx.save();
                        ctx.beginPath();
                        ctx.rect(x + fullW, 0, charW * partial + 4, HEIGHT);
                        ctx.clip();
                        drawChalkText(visibleFull + nextChar, x, Y, partial);
                        ctx.restore();

                        // Spawn dust at the drawing tip
                        spawnDust(x + fullW + charW * partial, Y - FONT_SIZE * 0.3);
                    }

                    x += word._mw + SPACING;
                });
            }

            updateDust();
            drawDust();

            requestAnimationFrame(render);
        }

        // Controls
        document.getElementById('colorPicker').addEventListener('input', e => { chalkColor = e.target.value; });
        document.getElementById('texSlider').addEventListener('input', e => {
            textureStrength = parseFloat(e.target.value);
            document.getElementById('texVal').innerText = textureStrength.toFixed(2);
        });
        document.getElementById('speedSlider').addEventListener('input', e => {
            writeSpeed = parseFloat(e.target.value);
            document.getElementById('speedVal').innerText = writeSpeed.toFixed(1);
        });
        document.getElementById('dustSlider').addEventListener('input', e => {
            dustAmount = parseFloat(e.target.value);
            document.getElementById('dustVal').innerText = dustAmount.toFixed(2);
        });
        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) return;
            dustParticles = [];
            isPlaying = true; startTs = performance.now(); playbackTime = 0;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('playBtn').innerText = 'Writing...';
        });

        document.fonts.load(FONT).then(() => requestAnimationFrame(render)).catch(() => requestAnimationFrame(render));
    </script>
</body>
</html>
