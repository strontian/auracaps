<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Caption Effect</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: #080808;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        canvas {
            box-shadow: 0 0 60px rgba(180,200,220,0.15);
            background: #050505;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls {
            background: #111; padding: 25px; border-radius: 12px;
            border: 1px solid #2a2a2a; display: flex; flex-wrap: wrap;
            gap: 30px; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); max-width: 900px;
        }
        .control-group { display: flex; flex-direction: column; gap: 8px; width: 160px; }
        .label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: #888;
        }
        .value-readout {
            font-family: monospace; color: #c8d8e8; font-size: 0.9rem;
            background: rgba(0,0,0,0.4); padding: 2px 6px;
            border-radius: 4px; border: 1px solid #2a2a2a;
        }
        button#playBtn {
            background: linear-gradient(135deg, #888 0%, #ddd 40%, #999 60%, #bbb 100%);
            color: #000; border: none;
            padding: 15px 30px; font-family: 'Black Han Sans', sans-serif;
            font-size: 1.4rem; cursor: pointer; border-radius: 4px;
            box-shadow: 0 2px 10px rgba(200,220,240,0.3),
                        inset 0 1px 0 rgba(255,255,255,0.4),
                        inset 0 -1px 0 rgba(0,0,0,0.3);
            transition: all 0.2s; letter-spacing: 2px;
        }
        button#playBtn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(200,220,240,0.5); }
        button#playBtn:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }
        .timer-display {
            font-family: monospace; font-size: 1.2rem; color: #c8d8e8;
            min-width: 80px; text-align: right;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #c8d8e8; margin-top: -6px; cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #333; border-radius: 2px;
        }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>
    <div class="controls">
        <button id="playBtn">PLAY</button>
        <div class="timer-display" id="timer">0.00s</div>

        <div style="border-left:1px solid #222; padding-left:30px; display:flex; flex-direction:column; gap:15px;">
            <div class="control-group">
                <div class="label"><span>Shimmer Speed</span><span id="shimmerVal" class="value-readout">1.0</span></div>
                <input type="range" id="shimmerSlider" min="0.1" max="4" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <div class="label"><span>Drip Speed</span><span id="dripVal" class="value-readout">1.0</span></div>
                <input type="range" id="dripSlider" min="0.2" max="4" step="0.1" value="1.0">
            </div>
        </div>

        <div style="border-left:1px solid #222; padding-left:30px; display:flex; flex-direction:column; gap:15px;">
            <div class="control-group">
                <div class="label"><span>Tint</span></div>
                <input type="color" id="tintPicker" value="#b0c8e0"
                    style="-webkit-appearance:none;border:none;width:100%;height:30px;padding:0;background:none;cursor:pointer;border-radius:4px;overflow:hidden;">
            </div>
            <div class="control-group">
                <div class="label"><span>Reflection</span><span id="reflVal" class="value-readout">0.7</span></div>
                <input type="range" id="reflSlider" min="0" max="1" step="0.05" value="0.7">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        const WIDTH = 1200, HEIGHT = 240;
        canvas.width = WIDTH; canvas.height = HEIGHT;

        const FONT_SIZE = 80;
        const FONT = `900 ${FONT_SIZE}px 'Black Han Sans', sans-serif`;
        const SPACING = 20;

        // --- SRT DATA ---
        const srtRaw = `
1
00:00:00,200 --> 00:00:02,000
Hi. So

2
00:00:02,100 --> 00:00:04,900
I recently got back into playing Magic.

3
00:00:05,100 --> 00:00:07,500
It's surprisingly expensive!
`;

        const rawWords = [
            { punctuated_word: 'Hi.',           start: 0.24, end: 0.74 },
            { punctuated_word: 'So',            start: 1.44, end: 1.94 },
            { punctuated_word: 'I',             start: 2.16, end: 2.56 },
            { punctuated_word: 'recently',      start: 2.56, end: 3.04 },
            { punctuated_word: 'got',           start: 3.04, end: 3.28 },
            { punctuated_word: 'back',          start: 3.28, end: 3.44 },
            { punctuated_word: 'into',          start: 3.44, end: 3.92 },
            { punctuated_word: 'playing',       start: 3.92, end: 4.40 },
            { punctuated_word: 'Magic.',        start: 4.40, end: 4.72 },
            { punctuated_word: "It's",          start: 5.10, end: 5.40 },
            { punctuated_word: 'surprisingly',  start: 5.40, end: 6.20 },
            { punctuated_word: 'expensive!',    start: 6.20, end: 6.90 },
        ];

        function parseSRTTime(t) {
            const [hms, ms] = t.split(',');
            const [h, m, s] = hms.split(':').map(Number);
            return h * 3600 + m * 60 + s + Number(ms) / 1000;
        }
        function parseSRT(raw) {
            return raw.trim().split(/\n\s*\n/).map(block => {
                const lines = block.split('\n');
                if (lines.length < 3) return null;
                const [s, e] = lines[1].split(' --> ');
                return { start: parseSRTTime(s), end: parseSRTTime(e), text: lines.slice(2).join(' ') };
            }).filter(Boolean);
        }
        const srtBlocks = parseSRT(srtRaw);

        // --- SETTINGS ---
        let shimmerSpeed = 1.0;
        let dripSpeed = 1.0;
        let tintColor = '#b0c8e0';
        let reflStrength = 0.7;

        // --- STATE ---
        let isPlaying = false, startTs = 0, playbackTime = 0;

        // Per-word drip state
        let wordDrips = {};

        // Drip drop
        function createDrip(x, y, w) {
            return {
                x: x + Math.random() * w,
                y,
                vy: 0.3 + Math.random() * 0.8,
                life: 1.0,
                size: 2 + Math.random() * 4,
                stretch: 1 + Math.random() * 3,
                tail: [],
            };
        }

        function hexToRgb(h) {
            const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
            return r ? [parseInt(r[1],16), parseInt(r[2],16), parseInt(r[3],16)] : [176, 200, 224];
        }

        // Build chrome gradient — vertical bands that shimmer
        function makeChromeGrad(x, y, w, h, t) {
            const [tr, tg, tb] = hexToRgb(tintColor);
            const shimOffset = Math.sin(t * shimmerSpeed * 2) * w * 0.4;
            const g = ctx.createLinearGradient(x + shimOffset, y, x + w + shimOffset, y + h);

            // Chrome color bands: dark/light/bright/dark/mid
            g.addColorStop(0,   `rgb(${20+tr*.1|0},${20+tg*.1|0},${20+tb*.1|0})`);
            g.addColorStop(0.1, `rgb(${80+tr*.2|0},${90+tg*.2|0},${100+tb*.2|0})`);
            g.addColorStop(0.25,`rgb(${200+tr*.3|0},${210+tg*.3|0},${220+tb*.3|0})`);
            g.addColorStop(0.4, `rgb(${240+tr*.2|0},${245+tg*.2|0},${255|0})`); // highlight
            g.addColorStop(0.5, `rgb(${130+tr*.3|0},${140+tg*.3|0},${160+tb*.3|0})`);
            g.addColorStop(0.65,`rgb(${40+tr*.2|0},${45+tg*.2|0},${55+tb*.2|0})`);
            g.addColorStop(0.8, `rgb(${160+tr*.2|0},${170+tg*.2|0},${190+tb*.2|0})`);
            g.addColorStop(0.9, `rgb(${220+tr*.1|0},${230+tg*.1|0},${240|0})`);
            g.addColorStop(1,   `rgb(${60+tr*.1|0},${65+tg*.1|0},${80+tb*.1|0})`);
            return g;
        }

        // Vertical shimmer — separate gradient
        function makeVertGrad(x, y, w, h, t) {
            const g = ctx.createLinearGradient(x, y, x, y + h);
            const pulse = (Math.sin(t * shimmerSpeed * 1.7 + x * 0.01) + 1) * 0.5;
            g.addColorStop(0,   `rgba(255,255,255,${0.05 + pulse * 0.1})`);
            g.addColorStop(0.3, `rgba(255,255,255,${0.4  + pulse * reflStrength * 0.3})`);
            g.addColorStop(0.5, `rgba(255,255,255,${0.15 + pulse * 0.05})`);
            g.addColorStop(0.7, `rgba(0,0,0,${0.3 + pulse * 0.1})`);
            g.addColorStop(1,   `rgba(0,0,0,${0.5})`);
            return g;
        }

        // Offscreen for mask rendering
        const offCanvas = document.createElement('canvas');
        offCanvas.width = WIDTH; offCanvas.height = HEIGHT;
        const offCtx = offCanvas.getContext('2d');

        function drawWordChrome(word, x, y, t, fadeIn) {
            if (fadeIn <= 0) return;

            offCtx.clearRect(0, 0, WIDTH, HEIGHT);
            offCtx.font = FONT;
            offCtx.textBaseline = 'middle';
            offCtx.textAlign = 'left';
            offCtx.fillStyle = '#fff';
            offCtx.fillText(word, x, y);

            const bbox = {
                x: x - 4,
                y: y - FONT_SIZE * 0.6,
                w: ctx.measureText(word).width + 8,
                h: FONT_SIZE * 1.2,
            };

            // Chrome base
            offCtx.globalCompositeOperation = 'source-in';
            offCtx.fillStyle = makeChromeGrad(bbox.x, bbox.y, bbox.w, bbox.h, t);
            offCtx.fillRect(bbox.x, bbox.y, bbox.w, bbox.h);

            // Vertical shimmer overlay
            offCtx.globalCompositeOperation = 'source-atop';
            offCtx.fillStyle = makeVertGrad(bbox.x, bbox.y, bbox.w, bbox.h, t);
            offCtx.fillRect(bbox.x, bbox.y, bbox.w, bbox.h);
            offCtx.globalCompositeOperation = 'source-over';

            // Blit to main canvas
            ctx.save();
            ctx.globalAlpha = fadeIn;
            ctx.drawImage(offCanvas, 0, 0);
            ctx.restore();

            // Edge highlight (thin white stroke)
            ctx.save();
            ctx.globalAlpha = fadeIn * 0.4 * reflStrength;
            ctx.font = FONT;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'left';
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 1.5;
            ctx.strokeText(word, x, y);
            ctx.restore();
        }

        function updateDrips(drips) {
            for (let i = drips.length - 1; i >= 0; i--) {
                const d = drips[i];
                d.tail.push({ x: d.x, y: d.y });
                if (d.tail.length > 12) d.tail.shift();
                d.vy += 0.15 * dripSpeed;
                d.y += d.vy * dripSpeed;
                d.life -= 0.015;
                if (d.life <= 0 || d.y > HEIGHT + 20) drips.splice(i, 1);
            }
        }

        function drawDrips(drips, t) {
            drips.forEach(d => {
                const [tr, tg, tb] = hexToRgb(tintColor);
                ctx.save();
                ctx.globalAlpha = d.life * 0.9;

                // Tail
                if (d.tail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(d.tail[0].x, d.tail[0].y);
                    d.tail.forEach(pt => ctx.lineTo(pt.x, pt.y));
                    const tg2 = ctx.createLinearGradient(d.tail[0].x, d.tail[0].y, d.x, d.y);
                    tg2.addColorStop(0, `rgba(${tr},${tg},${tb},0)`);
                    tg2.addColorStop(1, `rgba(${tr},${tg},${tb},${d.life * 0.6})`);
                    ctx.strokeStyle = tg2;
                    ctx.lineWidth = d.size * 0.6;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Droplet
                const g2 = ctx.createRadialGradient(d.x - d.size*0.3, d.y - d.size*0.3, 0, d.x, d.y, d.size);
                g2.addColorStop(0, '#fff');
                g2.addColorStop(0.3, `rgb(${180+tr*.3|0},${190+tg*.3|0},${210+tb*.3|0})`);
                g2.addColorStop(1, `rgba(${tr*.5|0},${tg*.5|0},${tb*.5|0},0.5)`);
                ctx.fillStyle = g2;
                ctx.beginPath();
                ctx.ellipse(d.x, d.y, d.size, d.size * d.stretch, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function render(ts) {
            if (isPlaying) {
                playbackTime = (ts - startTs) / 1000;
                document.getElementById('timer').innerText = playbackTime.toFixed(2) + 's';
                const lastEnd = rawWords[rawWords.length - 1].end;
                if (playbackTime > lastEnd + 2.5) {
                    isPlaying = false;
                    playbackTime = 0;
                    wordDrips = {};
                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('playBtn').innerText = 'REPLAY';
                }
            }

            const t = playbackTime;

            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Subtle dark gradient background
            const bg = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            bg.addColorStop(0, 'rgba(15,15,25,1)');
            bg.addColorStop(1, 'rgba(5,5,10,1)');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const activeBlock = srtBlocks.find(b => playbackTime >= b.start && playbackTime <= b.end + 0.4);

            if (activeBlock) {
                const blockWords = rawWords.filter(w => w.start >= activeBlock.start - 0.1 && w.start <= activeBlock.end + 0.1);

                ctx.font = FONT;
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'left';

                let totalWidth = 0;
                blockWords.forEach(w => { w._mw = ctx.measureText(w.punctuated_word).width; totalWidth += w._mw; });
                totalWidth += (blockWords.length - 1) * SPACING;
                let x = (WIDTH - totalWidth) / 2;
                const Y = HEIGHT / 2;

                blockWords.forEach(word => {
                    const elapsed = playbackTime - word.start;
                    const fadeIn = Math.max(0, Math.min(1, elapsed / 0.15));

                    if (fadeIn > 0) {
                        drawWordChrome(word.punctuated_word, x, Y, t + x * 0.003, fadeIn);

                        // Spawn drips when word first appears
                        if (!wordDrips[word.start]) wordDrips[word.start] = [];
                        const drips = wordDrips[word.start];

                        // Initial burst of drips
                        if (elapsed < 0.1 && drips.length < 4) {
                            for (let i = 0; i < 3; i++) {
                                drips.push(createDrip(x, Y + FONT_SIZE * 0.45, word._mw));
                            }
                        }
                        // Occasional idle drips
                        if (elapsed < 2 && Math.random() < 0.02 && drips.length < 8) {
                            drips.push(createDrip(x, Y + FONT_SIZE * 0.45, word._mw));
                        }

                        updateDrips(drips);
                        drawDrips(drips, t);
                    }

                    x += word._mw + SPACING;
                });
            }

            requestAnimationFrame(render);
        }

        // Controls
        document.getElementById('shimmerSlider').addEventListener('input', e => {
            shimmerSpeed = parseFloat(e.target.value);
            document.getElementById('shimmerVal').innerText = shimmerSpeed.toFixed(1);
        });
        document.getElementById('dripSlider').addEventListener('input', e => {
            dripSpeed = parseFloat(e.target.value);
            document.getElementById('dripVal').innerText = dripSpeed.toFixed(1);
        });
        document.getElementById('tintPicker').addEventListener('input', e => { tintColor = e.target.value; });
        document.getElementById('reflSlider').addEventListener('input', e => {
            reflStrength = parseFloat(e.target.value);
            document.getElementById('reflVal').innerText = reflStrength.toFixed(2);
        });
        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) return;
            wordDrips = {};
            isPlaying = true; startTs = performance.now(); playbackTime = 0;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('playBtn').innerText = 'PLAYING...';
        });

        document.fonts.load(FONT).then(() => requestAnimationFrame(render)).catch(() => requestAnimationFrame(render));
    </script>
</body>
</html>
