<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>* { margin: 0; padding: 0; } body { background: #000; overflow: hidden; }</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { TextGeometry }    from 'three/addons/geometries/TextGeometry.js';
import { FontLoader }      from 'three/addons/loaders/FontLoader.js';
import { RGBELoader }      from 'three/addons/loaders/RGBELoader.js';

// --- Dimensions from URL params ---
const params = new URLSearchParams(location.search);
const W = parseInt(params.get('width')  || 1080);
const H = parseInt(params.get('height') || 1920);

// --- SRT data (same as gold-video.html) ---
const subtitles = [
  { start: 0.24,   end: 4.4,    text: "Hi. So I recently got back into playing" },
  { start: 4.4,    end: 7.6,    text: "Magic the Gathering. I haven't played since high" },
  { start: 7.6,    end: 10.32,  text: "school, and I met some new friends here" },
  { start: 10.32,  end: 12.625, text: "that play, and it's really fun. So" },
  { start: 12.625, end: 15.905, text: "I've been playing commander, and I did get" },
  { start: 15.905, end: 23.985, text: "the start of a Sephiroth commander deck. And," },
  { start: 23.985, end: 25.665, text: "you know, one of the fun things about" },
  { start: 25.665, end: 28.65,  text: "magic is, like, all of the beautiful card" },
  { start: 29.029, end: 33.03,  text: "sleeves and dice and placemats and all" },
  { start: 33.03,  end: 35.69,  text: "the beautiful things that you can buy" },
  { start: 36.39,  end: 39.43,  text: "to have, like, a really cool setup. Obviously," },
  { start: 39.43,  end: 41.67,  text: "I'm very interested in that, but I kind" },
  { start: 41.67,  end: 44.945, text: "of wanted to get into it and set" },
  { start: 44.945, end: 47.504, text: "some you know, just have my little setup" },
  { start: 47.504, end: 49.745, text: "without having to, like, spend a bunch on" },
  { start: 49.745, end: 53.204, text: "a new hobby. So I did that today." },
  { start: 53.425, end: 56.085, text: "I had this old box from Container Store," },
  { start: 58.5,   end: 61.56,  text: "and I covered it with this washi paper" },
  { start: 61.62,  end: 65.78,  text: "that I also had, this Japanese paper, just" },
  { start: 65.78,  end: 69.575, text: "with glue. It's really easy to do, and" },
  { start: 69.575, end: 71.895, text: "so that's kinda my box. And then" },
  { start: 71.895, end: 75.515, text: "what I put in it is, my commander" },
  { start: 75.735, end: 78.695, text: "deck. My Sephiroth deck I'm keeping in" },
  { start: 78.695, end: 82.315, text: "this. This was, originally a Japanese stationery set," },
  { start: 82.455, end: 83.759, text: "and I kept the box because it" },
  { start: 83.759, end: 86.72,  text: "was so pretty. And it's really good for" },
  { start: 86.72,  end: 88.799, text: "holding my cards. So I will show" },
  { start: 88.799, end: 94.399, text: "you Sephiroth. Here he is in all his" },
  { start: 94.399, end: 102.535,text: "glory. Oh, is he?" },
  { start: 102.535,end: 104.295,text: "And I'll just show you one other card" },
  { start: 104.295,end: 110.135,text: "that I absolutely love. Where is she?" },
  { start: 110.135,end: 115.14, text: "I really wanna build a Hatsune Miku deck," },
  { start: 115.14, end: 119.78, text: "just for the vibes, and there's this one" },
  { start: 119.78, end: 125.08, text: "counterspell card that I got. Where are you?" },
  { start: 125.22, end: 136.635,text: "So many rats. So many rats and goblins." },
  { start: 136.635,end: 149.29, text: "Where are you, Hatsune? Oh my gosh." },
  { start: 149.29, end: 155.775,text: "Here she is. Look at this counterspell." },
  { start: 155.775,end: 158.355,text: "She's so cute. She's like a horned paparazzi." },
  { start: 160.655,end: 165.295,text: "Adorable. Anyhoo. Sorry. Getting sidetracked. So, yeah, in" },
  { start: 165.295,end: 169.04, text: "my deck, I have my commander deck. I'm" },
  { start: 169.04, end: 178.32, text: "storing it here for now. And then I" },
  { start: 178.32, end: 182.915,text: "have this — also a stationery box. I" },
  { start: 182.915,end: 184.595,text: "really like saving boxes for things like this" },
  { start: 184.595,end: 185.875,text: "because you never know when they're gonna come" },
  { start: 185.875,end: 188.114,text: "in handy. It's the perfect fit for all" },
  { start: 188.114,end: 190.675,text: "of my other cards, that are just, like," },
  { start: 190.675,end: 192.675,text: "not — haven't really built into a" },
  { start: 192.675,end: 194.879,text: "deck yet. And then someone got me a" },
  { start: 194.879,end: 197.68, text: "gift that had, like, a little jewelry bag" },
  { start: 197.68, end: 200.64, text: "with it, so I kept that. And I'm" },
  { start: 200.64, end: 203.06, text: "using it to store these D&D" },
  { start: 203.68, end: 206.16, text: "dice that I got at the Washington Wren" },
  { start: 206.16, end: 209.545,text: "Fair, that are fairy fire themed. I rolled" },
  { start: 209.545,end: 211.465,text: "a d20 when I picked them up," },
  { start: 211.465,end: 212.585,text: "so I was like — and I" },
  { start: 212.585,end: 214.665,text: "didn't have a fancy set yet, so" },
  { start: 214.665,end: 216.905,text: "I was like, I gotta have them. And" },
  { start: 216.905,end: 220.925,text: "then, I'm keeping my token cards in here." },
  { start: 221.145,end: 222.71, text: "I feel like token cards would be really" },
  { start: 222.71, end: 224.47, text: "fun to make some custom ones, but we'll" },
  { start: 224.47, end: 226.31, text: "get to that. And then this is" },
  { start: 226.31, end: 229.83, text: "not really useful in any way, but I" },
  { start: 229.83, end: 232.87, text: "got this Sailor Moon figurine. She's, like, made" },
  { start: 232.87, end: 234.23, text: "out of, like — I think she's made out" },
  { start: 234.23, end: 235.75, text: "of crystal. I'm not sure. She could be" },
  { start: 235.75, end: 239.165,text: "just, like, very convincing cold plastic. I got" },
  { start: 239.165,end: 240.525,text: "her when I lived in LA, and I" },
  { start: 240.525,end: 242.205,text: "just was like, she's cute. I could just" },
  { start: 242.205,end: 244.065,text: "put her out in my area" },
  { start: 244.205,end: 247.805,text: "to feel good about my life" },
  { start: 247.805,end: 251.569,text: "when I'm playing Magic. So, yeah, that is" },
  { start: 251.569,end: 254.05, text: "my setup. It took me, like, less" },
  { start: 254.05, end: 256.39, text: "than an hour to kind of" },
  { start: 256.61, end: 258.529,text: "get all this together from stuff that I" },
  { start: 258.529,end: 261.25, text: "had, and I'm really happy with it for" },
  { start: 261.25, end: 264.348,text: "now. So, yay. And I'm actually in the" },
  { start: 264.348,end: 266.128,text: "car on the way to go and play" },
  { start: 266.588,end: 270.608,text: "some magic. So yeah. Bye." },
];
function getActiveSub(t) {
  return subtitles.find(s => t >= s.start && t < s.end) ?? null;
}

// --- Renderer ---
// preserveDrawingBuffer required for canvas.toDataURL() readback
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(1); // always 1x for deterministic output
renderer.setSize(W, H);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.5;
renderer.setClearColor(0x000000, 0);
renderer.domElement.id = 'three-canvas';
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
camera.position.set(0, 0, 90);

// --- Environment ---
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
new RGBELoader().load('../textures/venice_sunset_1k.hdr', hdrTex => {
  const envMap = pmrem.fromEquirectangular(hdrTex).texture;
  hdrTex.dispose();
  pmrem.dispose();
  scene.environment = envMap;
  trySetReady();
});

// --- Caption group with hardcoded display params ---
const group = new THREE.Group();
group.position.y = -33;
group.rotation.x = -10 * (Math.PI / 180);
group.scale.setScalar(0.8);
scene.add(group);

const FONT_SIZE = 2.5;
const WORD_SPACING_RATIO = 0.5;
const wordData = [];
let loadedFont = null;

function geoCfg(size) {
  return {
    font: loadedFont, size,
    depth: size * 0.25, curveSegments: 12,
    bevelEnabled: true,
    bevelThickness: size * 0.18, bevelSize: size * 0.05,
    bevelOffset: 0, bevelSegments: 16,
  };
}

function buildWords(words) {
  wordData.forEach(d => { group.remove(d.mesh); d.mesh.geometry.dispose(); d.faceMat.dispose(); d.bevelMat.dispose(); });
  wordData.length = 0;
  if (!loadedFont || !words.length) return;

  const WORD_SPACING = FONT_SIZE * WORD_SPACING_RATIO;
  const MAX_LINE_WIDTH = FONT_SIZE * 10;

  const measured = words.map(word => {
    const geo = new TextGeometry(word, geoCfg(FONT_SIZE));
    geo.computeBoundingBox();
    const bb = geo.boundingBox;
    return { word, geo, w: bb.max.x - bb.min.x };
  });

  const lines = [];
  let line = [], lineWidth = 0;
  measured.forEach(m => {
    const addWidth = m.w + (line.length ? WORD_SPACING : 0);
    if (line.length && lineWidth + addWidth > MAX_LINE_WIDTH) {
      lines.push(line); line = [m]; lineWidth = m.w;
    } else {
      line.push(m); lineWidth += addWidth;
    }
  });
  if (line.length) lines.push(line);

  const LINE_HEIGHT = FONT_SIZE * 1.5;
  let yOffset = (lines.length * LINE_HEIGHT) / 2;

  lines.forEach(lineWords => {
    const lw = lineWords.reduce((s, m) => s + m.w, 0) + WORD_SPACING * (lineWords.length - 1);
    let x = -lw / 2;
    lineWords.forEach(({ geo, w }) => {
      const faceMat = new THREE.MeshStandardMaterial({
        color: 0xffd700, metalness: 1.0, roughness: 0.08,
        envMapIntensity: 1.2, emissive: new THREE.Color(0xffd040), emissiveIntensity: 0,
      });
      const bevelMat = new THREE.MeshStandardMaterial({
        color: 0xffe066, metalness: 1.0, roughness: 0.02,
        envMapIntensity: 1.6, emissive: new THREE.Color(0xffd040), emissiveIntensity: 0,
      });
      const mesh = new THREE.Mesh(geo, [faceMat, bevelMat]);
      mesh.position.set(x, yOffset, 0);
      group.add(mesh);
      wordData.push({ mesh, faceMat, bevelMat });
      x += w + WORD_SPACING;
    });
    yOffset -= LINE_HEIGHT;
  });
}

new FontLoader().load(
  'https://cdn.jsdelivr.net/npm/three@0.170.0/examples/fonts/helvetiker_bold.typeface.json',
  font => { loadedFont = font; trySetReady(); }
);

// --- Ready gate: need both font and HDR before rendering ---
let fontReady = false, envReady = false;
function trySetReady() {
  if (loadedFont) fontReady = true;
  if (scene.environment) envReady = true;
  if (fontReady && envReady) window.isReady = true;
}

// --- Per-frame state ---
let currentSub = null;
let wordTimings = [];
const emissiveAlpha = new Array(200).fill(0);
const TRANS_SPEED = 6;
const FPS = 24;
const DT = 1 / FPS;
let envRotation = 0;

window.isReady = false;

window.setRenderTime = function(t) {
  const sub = getActiveSub(t);
  if (sub !== currentSub) {
    currentSub = sub;
    if (sub) {
      const words = sub.text.split(/\s+/).filter(Boolean);
      buildWords(words);
      const dur = sub.end - sub.start;
      const wDur = dur / words.length;
      wordTimings = words.map((_, i) => ({
        startT: sub.start + i * wDur,
        endT:   sub.start + (i + 1) * wDur,
      }));
    } else {
      buildWords([]);
      wordTimings = [];
    }
    emissiveAlpha.fill(0);
  }

  wordData.forEach((d, i) => {
    const wt = wordTimings[i];
    const isActive = wt && t >= wt.startT && t < wt.endT;
    emissiveAlpha[i] += ((isActive ? 1 : 0) - emissiveAlpha[i]) * TRANS_SPEED * DT;
    const ei = emissiveAlpha[i] * 1.45;
    d.faceMat.emissiveIntensity = ei;
    d.bevelMat.emissiveIntensity = ei * 1.3;
  });

  envRotation += 0.08 * DT;
  scene.environmentRotation.y = envRotation;

  renderer.render(scene, camera);
};
</script>
</body>
</html>
