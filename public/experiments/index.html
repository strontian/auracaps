<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Experiments — Dev Index</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: ui-monospace, 'SF Mono', monospace;
      background: #111;
      color: #ccc;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 220px;
      min-width: 220px;
      background: #1a1a1a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
    }

    #sidebar-header span {
      color: #888;
    }

    #nav {
      overflow-y: auto;
      flex: 1;
    }

    #nav a {
      display: block;
      padding: 10px 16px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
      border-left: 2px solid transparent;
      transition: all 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #nav a:hover {
      background: #222;
      color: #ddd;
    }

    #nav a.active {
      color: #fff;
      border-left-color: #4a9eff;
      background: #1e2a38;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      cursor: pointer;
      user-select: none;
      border-top: 1px solid #222;
      margin-top: 4px;
    }
    .section-header:hover { color: #888; }
    .section-header .arrow {
      font-size: 8px;
      transition: transform 0.15s;
      display: inline-block;
    }
    .section-header.open .arrow { transform: rotate(90deg); }
    .section-items { display: none; }
    .section-items.open { display: block; }
    .section-items a { padding-left: 28px; }

    /* Main */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      height: 38px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      font-size: 12px;
      color: #555;
      flex-shrink: 0;
    }

    #toolbar #current-name {
      color: #aaa;
      flex: 1;
    }

    #toolbar a {
      color: #4a9eff;
      text-decoration: none;
      font-size: 11px;
    }

    #toolbar a:hover { text-decoration: underline; }

    #preview {
      flex: 1;
      border: none;
      background: #000;
    }

    #empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">experiments <span id="count"></span></div>
  <nav id="nav"></nav>
</div>

<div id="main">
  <div id="toolbar">
    <span id="current-name">select a demo</span>
    <a id="open-link" href="#" target="_blank" style="display:none">↗ open</a>
  </div>
  <div id="empty">← pick a demo</div>
  <iframe id="preview" style="display:none"></iframe>
</div>

<script>
  const entries = [
    { name: 'adapt neon',   file: 'adapt_neon.html' },
    { name: 'chalk',        file: 'chalk.html' },
    { name: 'chrome',       file: 'chrome.html' },
    { name: 'fire',         file: 'fire.html' },
    { name: 'glitch',       file: 'glitch.html' },
    { name: 'led',          file: 'led.html' },
    { name: 'neon',         file: 'neon.html' },
    { name: 'typewriter',   file: 'typewriter.html' },
    { name: 'neon hdr',     file: 'neon_hdr_demo.html' },
    { name: 'neon hdr 2',   file: 'neon_hdr_demo2.html' },
    { name: 'rb',           file: 'rb.html' },
    { name: 'rc',           file: 'rc.html' },
    { name: 'rc2',          file: 'rc2.html' },
    {
      section: 'canvas fx', collapsed: true, items: [
        { name: 'bevel',    file: 'bevel.html' },
        { name: 'blend',    file: 'blend.html' },
        { name: 'grad',     file: 'grad.html' },
      ]
    },
    {
      section: 'three.js', collapsed: false, items: [
        { name: '3d',            file: '3d.html' },
        { name: 'gold',          file: 'gold.html' },
        { name: 'gold render',   file: 'gold-render.html' },
        { name: 'gold room',     file: 'gold-room.html' },
        { name: 'gold room hdr', file: 'gold-room-hdr.html' },
        { name: 'gold video',    file: 'gold-video.html' },
        { name: 'space',         file: 'space.html' },
        { name: 'lottie',        file: 'lottie.html' },
      ]
    },
  ];

  const nav = document.getElementById('nav');
  const preview = document.getElementById('preview');
  const empty = document.getElementById('empty');
  const currentName = document.getElementById('current-name');
  const openLink = document.getElementById('open-link');

  function countDemos(list) {
    return list.reduce((n, e) => n + (e.section ? e.items.length : 1), 0);
  }
  document.getElementById('count').textContent = `(${countDemos(entries)})`;

  function makeLink(demo) {
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = demo.name;
    a.addEventListener('click', e => {
      e.preventDefault();
      nav.querySelectorAll('a').forEach(el => el.classList.remove('active'));
      a.classList.add('active');
      currentName.textContent = demo.file;
      openLink.href = demo.file;
      openLink.style.display = 'inline';
      empty.style.display = 'none';
      preview.style.display = 'block';
      preview.src = demo.file;
    });
    return a;
  }

  entries.forEach(entry => {
    if (!entry.section) {
      nav.appendChild(makeLink(entry));
      return;
    }
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `<span class="arrow">▶</span>${entry.section}`;

    const items = document.createElement('div');
    items.className = 'section-items' + (entry.collapsed ? '' : ' open');
    if (!entry.collapsed) header.classList.add('open');

    header.addEventListener('click', () => {
      const open = items.classList.toggle('open');
      header.classList.toggle('open', open);
    });

    entry.items.forEach(demo => items.appendChild(makeLink(demo)));
    nav.appendChild(header);
    nav.appendChild(items);
  });

  // keyboard nav (flat links only)
  document.addEventListener('keydown', e => {
    const allLinks = [...nav.querySelectorAll('a')];
    const active = nav.querySelector('a.active');
    if (!active) {
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') allLinks[0]?.click();
      return;
    }
    const idx = allLinks.indexOf(active);
    if (e.key === 'ArrowDown' && idx < allLinks.length - 1) allLinks[idx + 1].click();
    else if (e.key === 'ArrowUp' && idx > 0) allLinks[idx - 1].click();
  });
</script>

</body>
</html>
