<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter Caption Effect</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&family=Pixelify+Sans:wght@700&family=DotGothic16&family=Tiny5&family=Micro+5&family=Major+Mono+Display&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: #050508;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        canvas {
            box-shadow: 0 0 40px rgba(0, 255, 80, 0.12);
            background: #0a0a0f;
            border: 4px solid #1a2a1a;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls {
            background: #111; padding: 25px; border-radius: 12px;
            border: 1px solid #2a2a2a; display: flex; flex-wrap: wrap;
            gap: 30px; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); max-width: 1000px;
        }
        .control-section { display: flex; flex-direction: column; gap: 15px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; width: 160px; }
        .control-group.wide { width: 220px; }
        .label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: #888;
        }
        .value-readout {
            font-family: monospace; color: #33ff66; font-size: 0.9rem;
            background: rgba(0,0,0,0.4); padding: 2px 6px;
            border-radius: 4px; border: 1px solid #2a2a2a;
        }
        select#fontPicker {
            width: 100%; background: #1a1a1a; color: #ccc; border: 1px solid #333;
            padding: 6px 8px; border-radius: 4px; font-size: 0.85rem; cursor: pointer;
            -webkit-appearance: none; appearance: none;
        }
        select#fontPicker:focus { outline: none; border-color: #33ff66; }
        button#playBtn {
            background: #33ff66; color: #000; border: none;
            padding: 15px 30px; font-family: monospace;
            font-size: 1.2rem; cursor: pointer; border-radius: 4px;
            box-shadow: 0 0 15px #33ff66; transition: all 0.2s;
        }
        button#playBtn:hover { background: #fff; box-shadow: 0 0 25px #33ff66; transform: scale(1.05); }
        button#playBtn:disabled { background: #222; color: #444; box-shadow: none; cursor: not-allowed; }
        .timer-display {
            font-family: monospace; font-size: 1.2rem; color: #33ff66;
            text-shadow: 0 0 5px #33ff66; min-width: 80px; text-align: right;
        }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #fff; margin-top: -6px; cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #333; border-radius: 2px;
        }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>
    <div class="controls">
        <button id="playBtn">PLAY</button>
        <div class="timer-display" id="timer">0.00s</div>

        <div class="control-section" style="border-left:1px solid #222; padding-left:30px;">
            <div class="control-group wide">
                <div class="label"><span>Font</span></div>
                <select id="fontPicker">
                    <option value="Press Start 2P" data-size="42">Press Start 2P — arcade bitmap</option>
                    <option value="VT323"           data-size="64">VT323 — CRT terminal</option>
                    <option value="Silkscreen"      data-size="52">Silkscreen — arcade cabinet</option>
                    <option value="Pixelify Sans"   data-size="56">Pixelify Sans — modern pixel</option>
                    <option value="DotGothic16"     data-size="56">DotGothic16 — dot matrix</option>
                    <option value="Tiny5"           data-size="64">Tiny5 — micro bitmap</option>
                    <option value="Micro 5"         data-size="64">Micro 5 — blocky grid</option>
                    <option value="Major Mono Display" data-size="52">Major Mono Display — retrofuture</option>
                </select>
            </div>
            <div class="control-group">
                <div class="label"><span>Scan Lines</span><span id="scanVal" class="value-readout">0.12</span></div>
                <input type="range" id="scanSlider" min="0" max="0.4" step="0.01" value="0.12">
            </div>
        </div>

        <div class="control-section" style="border-left:1px solid #222; padding-left:30px;">
            <div class="control-group">
                <div class="label"><span>Blink Speed</span><span id="blinkVal" class="value-readout">1.5</span></div>
                <input type="range" id="blinkSlider" min="0.5" max="5" step="0.1" value="1.5">
            </div>
            <div class="control-group">
                <div class="label"><span>Text Color</span></div>
                <input type="color" id="colorPicker" value="#33ff66"
                    style="-webkit-appearance:none;border:none;width:100%;height:30px;padding:0;background:none;cursor:pointer;border-radius:4px;overflow:hidden;">
            </div>
        </div>

        <div class="control-section" style="border-left:1px solid #222; padding-left:30px;">
            <div class="control-group">
                <div class="label"><span>Glow</span><span id="glowVal" class="value-readout">0.6</span></div>
                <input type="range" id="glowSlider" min="0" max="1" step="0.05" value="0.6">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        const WIDTH = 1200, HEIGHT = 200;
        canvas.width = WIDTH; canvas.height = HEIGHT;

        const SPACING = 16;

        // --- FONT STATE ---
        let fontFamily = 'Press Start 2P';
        let fontSize = 42;
        let currentFont = () => `${fontSize}px '${fontFamily}', monospace`;

        // --- SRT DATA ---
        const srtRaw = `
1
00:00:00,200 --> 00:00:02,000
Hi. So

2
00:00:02,100 --> 00:00:04,900
I recently got back into playing Magic.

3
00:00:05,100 --> 00:00:07,500
It's surprisingly expensive!
`;

        const rawWords = [
            { punctuated_word: 'Hi.',           start: 0.24, end: 0.74 },
            { punctuated_word: 'So',            start: 1.44, end: 1.94 },
            { punctuated_word: 'I',             start: 2.16, end: 2.56 },
            { punctuated_word: 'recently',      start: 2.56, end: 3.04 },
            { punctuated_word: 'got',           start: 3.04, end: 3.28 },
            { punctuated_word: 'back',          start: 3.28, end: 3.44 },
            { punctuated_word: 'into',          start: 3.44, end: 3.92 },
            { punctuated_word: 'playing',       start: 3.92, end: 4.40 },
            { punctuated_word: 'Magic.',        start: 4.40, end: 4.72 },
            { punctuated_word: "It's",          start: 5.10, end: 5.40 },
            { punctuated_word: 'surprisingly',  start: 5.40, end: 6.20 },
            { punctuated_word: 'expensive!',    start: 6.20, end: 6.90 },
        ];

        function parseSRTTime(t) {
            const [hms, ms] = t.split(',');
            const [h, m, s] = hms.split(':').map(Number);
            return h * 3600 + m * 60 + s + Number(ms) / 1000;
        }
        function parseSRT(raw) {
            return raw.trim().split(/\n\s*\n/).map(block => {
                const lines = block.split('\n');
                if (lines.length < 3) return null;
                const [s, e] = lines[1].split(' --> ');
                return { start: parseSRTTime(s), end: parseSRTTime(e), text: lines.slice(2).join(' ') };
            }).filter(Boolean);
        }
        const srtBlocks = parseSRT(srtRaw);

        // --- SETTINGS ---
        let scanIntensity = 0.12;
        let blinkSpeed = 1.5;
        let textColor = '#33ff66';
        let glowStrength = 0.6;

        // --- STATE ---
        let isPlaying = false, startTs = 0, playbackTime = 0;

        function drawScanlines() {
            ctx.save();
            ctx.globalAlpha = scanIntensity;
            ctx.fillStyle = '#000';
            for (let y = 0; y < HEIGHT; y += 3) ctx.fillRect(0, y, WIDTH, 1);
            ctx.restore();
        }

        function render(ts) {
            if (isPlaying) {
                playbackTime = (ts - startTs) / 1000;
                document.getElementById('timer').innerText = playbackTime.toFixed(2) + 's';
                const lastEnd = rawWords[rawWords.length - 1].end;
                if (playbackTime > lastEnd + 1.5) {
                    isPlaying = false;
                    playbackTime = 0;
                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('playBtn').innerText = 'REPLAY';
                }
            }

            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const activeBlock = srtBlocks.find(b => playbackTime >= b.start && playbackTime <= b.end + 0.3);

            if (activeBlock) {
                const blockWords = rawWords.filter(w => w.start >= activeBlock.start - 0.1 && w.start <= activeBlock.end + 0.1);

                ctx.font = currentFont();
                ctx.textBaseline = 'middle';
                ctx.textAlign = 'left';

                let totalWidth = 0;
                blockWords.forEach(w => { w.mw = ctx.measureText(w.punctuated_word).width; totalWidth += w.mw; });
                totalWidth += (blockWords.length - 1) * SPACING;

                let x = (WIDTH - totalWidth) / 2;
                const Y = HEIGHT / 2;

                let cursorX = null, cursorY = null;

                blockWords.forEach(word => {
                    const progress = Math.max(0, Math.min(1, (playbackTime - word.start) / Math.max(0.01, word.end - word.start)));
                    const charsToShow = Math.floor(progress * word.punctuated_word.length);
                    const visible = word.punctuated_word.slice(0, charsToShow);

                    if (visible.length > 0) {
                        ctx.save();
                        if (glowStrength > 0) {
                            ctx.shadowColor = textColor;
                            ctx.shadowBlur = 18 * glowStrength;
                        }
                        ctx.fillStyle = textColor;
                        ctx.globalAlpha = 1;
                        ctx.fillText(visible, x, Y);
                        ctx.restore();
                    }

                    if (charsToShow > 0 && charsToShow < word.punctuated_word.length) {
                        const partialW = ctx.measureText(visible).width;
                        cursorX = x + partialW + 2;
                        cursorY = Y;
                    } else if (charsToShow === word.punctuated_word.length) {
                        cursorX = x + word.mw + 2;
                        cursorY = Y;
                    }

                    x += word.mw + SPACING;
                });

                // Blinking cursor
                const cursorOn = Math.sin(playbackTime * blinkSpeed * Math.PI * 2) > 0;
                if (cursorX !== null && cursorOn) {
                    ctx.save();
                    ctx.fillStyle = textColor;
                    if (glowStrength > 0) { ctx.shadowColor = textColor; ctx.shadowBlur = 12 * glowStrength; }
                    ctx.fillRect(cursorX, Y - fontSize * 0.45, 3, fontSize * 0.9);
                    ctx.restore();
                }
            }

            drawScanlines();

            if (Math.random() < 0.003) {
                ctx.save(); ctx.globalAlpha = 0.05; ctx.fillStyle = textColor;
                ctx.fillRect(0, 0, WIDTH, HEIGHT); ctx.restore();
            }

            requestAnimationFrame(render);
        }

        // Font selector — load font then swap
        document.getElementById('fontPicker').addEventListener('change', e => {
            const opt = e.target.selectedOptions[0];
            fontFamily = opt.value;
            fontSize = parseInt(opt.dataset.size);
            const f = currentFont();
            document.fonts.load(f).then(() => {}).catch(() => {});
        });

        document.getElementById('scanSlider').addEventListener('input', e => {
            scanIntensity = parseFloat(e.target.value);
            document.getElementById('scanVal').innerText = scanIntensity.toFixed(2);
        });
        document.getElementById('blinkSlider').addEventListener('input', e => {
            blinkSpeed = parseFloat(e.target.value);
            document.getElementById('blinkVal').innerText = blinkSpeed.toFixed(1);
        });
        document.getElementById('colorPicker').addEventListener('input', e => { textColor = e.target.value; });
        document.getElementById('glowSlider').addEventListener('input', e => {
            glowStrength = parseFloat(e.target.value);
            document.getElementById('glowVal').innerText = glowStrength.toFixed(2);
        });
        document.getElementById('playBtn').addEventListener('click', () => {
            if (isPlaying) return;
            isPlaying = true; startTs = performance.now(); playbackTime = 0;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('playBtn').innerText = 'PLAYING...';
        });

        // Load all fonts upfront, then start
        Promise.allSettled(
            ['Press Start 2P','VT323','Silkscreen','Pixelify Sans','DotGothic16','Tiny5','Micro 5','Major Mono Display']
            .map(f => document.fonts.load(`64px '${f}'`))
        ).then(() => requestAnimationFrame(render));
    </script>
</body>
</html>
