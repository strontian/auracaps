        function parseSRT(raw) {
            const blocks = [];
            for (const entry of raw.trim().split(/\n\n+/)) {
                const lines = entry.trim().split('\n');
                if (lines.length < 3) continue;
                const m = lines[1].match(/(\d+):(\d+):(\d+),(\d+) --> (\d+):(\d+):(\d+),(\d+)/);
                if (!m) continue;
                const sec = (h, min, s, ms) => +h * 3600 + +min * 60 + +s + +ms / 1000;
                blocks.push({
                    start: sec(m[1], m[2], m[3], m[4]),
                    end:   sec(m[5], m[6], m[7], m[8]),
                    text:  lines.slice(2).join(' ')
                });
            }
            return blocks;
        }

        const blocks = parseSRT(SRT);

        function getBlock(t) {
            return blocks.find(b => t >= b.start && t < b.end) || null;
        }

        // Synthesize evenly-spaced word timing from a block (for typewriter/glitch)
        function makeWords(block) {
            const words = block.text.split(/\s+/).filter(Boolean);
            const wDur = (block.end - block.start) / words.length;
            return words.map((w, i) => ({
                text: w,
                start: block.start + i * wDur,
                end:   block.start + (i + 1) * wDur,
            }));
        }

        // ── Canvas & state setup ──────────────────────────────────────────────
        const video         = document.getElementById('demoVideo');
        const captionCanvas = document.getElementById('captionCanvas');
        const captionCtx    = captionCanvas.getContext('2d');
        const auxCanvas     = document.createElement('canvas');
        const ledAuxCanvas  = document.createElement('canvas');

        let holoImage    = null;
        let ledDots      = null;
        let lastLEDText  = null;
        let rainbowState = {};
        let glitchState  = {};
        let neonWords    = [];
        let lastNeonText = '';

        function syncCanvas() {
            let w = video.clientWidth;
            let h = video.clientHeight;
            // Fallback: derive height from natural aspect ratio if not yet painted
            if (w > 0 && !h && video.videoWidth && video.videoHeight) {
                h = Math.round(w * video.videoHeight / video.videoWidth);
            }
            if (!w || !h) return;
            if (captionCanvas.width === w && captionCanvas.height === h) return;
            captionCanvas.width  = w;
            captionCanvas.height = h;
            auxCanvas.width      = w;
            auxCanvas.height     = h;
            ledAuxCanvas.width   = w;
            ledAuxCanvas.height  = h;
            ledDots = null;
            lastLEDText = null;
        }

        // ── Effect cycling ────────────────────────────────────────────────────
        const EFFECTS = ['neon', 'rainbow', 'led', 'holographic', 'typewriter', 'glitch'];
        let currentEffect = 'neon';
        let userPicked    = false;
        let cycleTimer    = null;

        function setEffect(name, byUser = true) {
            currentEffect = name;
            if (byUser) {
                userPicked = true;
                clearInterval(cycleTimer);
            }
            document.querySelectorAll('.style-pill').forEach(p => {
                p.classList.toggle('active', p.dataset.effect === name);
            });
            ledDots = null;
            lastLEDText = null;
            lastNeonText = '';
        }

        // ── Unified render loop ───────────────────────────────────────────────
        function renderFrame() {
            // Title
            renderTitle();

            // Caption overlay
            const t     = video.currentTime;
            const block = getBlock(t);
            const text  = block ? block.text : '';
            const w     = captionCanvas.width;
            const h     = captionCanvas.height;

            captionCtx.clearRect(0, 0, w, h);

            if (text && w > 0 && h > 0) {
                const fontSize          = Math.round(w * 0.09);
                const textHeightPercent = 7;

                if (currentEffect === 'holographic') {
                    if (holoImage) {
                        renderHolographicEffect(captionCtx, {
                            text, styleImage: holoImage, timestamp: t, fontSize, textHeightPercent
                        });
                    }

                } else if (currentEffect === 'rainbow') {
                    renderRainbowEffect(captionCtx, {
                        text, fontSize, textHeightPercent, state: rainbowState, auxCanvas
                    });

                } else if (currentEffect === 'led') {
                    if (text !== lastLEDText) {
                        ledDots = detectLEDDots({
                            text, fontSize, textHeightPercent, squareSize: 3,
                            auxCtx: ledAuxCanvas.getContext('2d')
                        });
                        lastLEDText = text;
                    }
                    if (ledDots && ledDots.length > 0) {
                        renderLEDEffect(captionCtx, { dots: ledDots, fontSize, squareSize: 3 });
                    }

                } else if (currentEffect === 'neon') {
                    const neonSubtitle = block ? { startTime: block.start, endTime: block.end } : null;
                    renderNeonEffect(captionCtx, {
                        text, fontSize, textHeightPercent,
                        allWords: block ? makeWords(block) : null,
                        subtitle: neonSubtitle,
                        timestamp: t,
                        tubeColor: '#00f7ff', haloColor: '#0051ff'
                    });

                } else if (currentEffect === 'typewriter') {
                    const twSubtitle = block ? { startTime: block.start, endTime: block.end } : null;
                    renderTypewriterEffect(captionCtx, {
                        text, fontSize, textHeightPercent,
                        allWords: block ? makeWords(block) : null,
                        subtitle: twSubtitle,
                        timestamp: t,
                        scanIntensity: 0
                    });

                } else if (currentEffect === 'glitch') {
                    const glitchSubtitle = block ? { startTime: block.start, endTime: block.end } : null;
                    renderGlitchEffect(captionCtx, {
                        text,
                        allWords: block ? makeWords(block) : [],
                        subtitle: glitchSubtitle,
                        timestamp: t,
                        fontSize, textHeightPercent,
                        state: glitchState,
                        auxCanvas,
                        atmosphericEffects: false
                    });
                }
            }

            requestAnimationFrame(renderFrame);
        }

        // ── Init ──────────────────────────────────────────────────────────────
        async function init() {
            // Load holographic texture
            holoImage = await new Promise((res, rej) => {
                const img = new Image();
                img.onload  = () => res(img);
                img.onerror = rej;
                img.src = '/images/holo.jpg';
            }).catch(() => null);

            // Sync canvas when video dimensions are known
            const doSync = () => requestAnimationFrame(syncCanvas);
            video.addEventListener('loadedmetadata', doSync);
            if (video.readyState >= 1) doSync();
            // Also sync on resize
            new ResizeObserver(syncCanvas).observe(video);

            // Pill buttons
            document.querySelectorAll('.style-pill').forEach(btn => {
                btn.addEventListener('click', () => setEffect(btn.dataset.effect, true));
            });

            // Auto-cycle every 4 seconds until user picks
            cycleTimer = setInterval(() => {
                if (!userPicked) {
                    const next = (EFFECTS.indexOf(currentEffect) + 1) % EFFECTS.length;
                    setEffect(EFFECTS[next], false);
                }
            }, 4000);

            renderFrame();
        }

        init().catch(console.error);
    </script>
</body>
</html>
